# Конфиг Alembic для ручного запуска миграций из консоли.
# Приложение применяет миграции само (Database.init), этот файл — для
# разработки: alembic revision --autogenerate, alembic upgrade head и т.п.

[alembic]
script_location = src/pxcontrol/engine/db/migrations
prepend_sys_path = src
sqlalchemy.url = sqlite:///pxcontrol.db

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[handler_console]
class = StreamHandler
args = (sys.stderr,)
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
